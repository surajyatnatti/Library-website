<!DOCTYPE html>
<html>
<head>
    <title>Smart Library</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: url("images/library4.jpg") no-repeat center center/cover;
            min-height: 100vh;
            color: white;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        /* Glass box */
        .box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            display: inline-block;
            width: 90%;
            max-width: 500px;
        }

        input {
            padding: 12px;
            width: 65%;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            background: #00c6ff;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0072ff;
        }

        #result {
            margin-top: 20px;
            font-size: 16px;
            text-align: left;
        }

        /* Gallery */
        .gallery {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            margin-top: 30px;
            padding: 10px;
        }

        .gallery img {
            height: 200px;
            border-radius: 12px;
            transition: transform 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        a {
            color: #00e6ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>📚 Smart Library System</h1>

        <div class="box">
            <input type="text" id="searchBox" placeholder="Search book...">
            <button onclick="searchBook()">Search</button>

            <div id="result"></div>
        </div>

        <!-- Gallery -->
        <div class="gallery">
            <img src="images/library1.jpg">
            <img src="images/library2.jpg">
            <img src="images/library3.jpg">
            <img src="images/library4.jpg">
        </div>

    </div>

    <script>
        const books = [
            {
                name: "Artificial Intelligence",
                author: "Saroj Kaushik",
                location: "Shelf A1",
                pdf: "books/ai.pdf"
            },
            {
                name: "Fundamentals of Database Systems",
                author: "Ramez Elmasri & Shamkant Navathe",
                location: "Shelf B2",
                pdf: "books/dbms.pdf"
            },
            {
                name: "Concrete Technology",
                author: "M L Gambhir",
                location: "Shelf C3",
                pdf: "books/concrete.pdf"
            },
            {
                name: "Power Electronics",
                author: "Ned Mohan",
                location: "Shelf D1",
                pdf: "books/power.pdf"
            },
            {
                name: "Engineering Mechanics",
                author: "Krishna Mohana Rao",
                location: "Shelf E2",
                pdf: "books/mechanics.pdf"
            }
        ];

        function searchBook() {
            let input = document.getElementById("searchBox").value.toLowerCase();

            let results = books.filter(book =>
                book.name.toLowerCase().includes(input)
            );

            if (results.length > 0) {
                let output = "✅ Results:<br><br>";

                results.forEach(book => {
                    output += `
                        <b>${book.name}</b><br>
                        Author: ${book.author}<br>
                        Location: ${book.location}<br>
                        <a href="${book.pdf}" target="_blank">📖 View / Download PDF</a>
                        <br><br>
                    `;
                });

                document.getElementById("result").innerHTML = output;
            } else {
                document.getElementById("result").innerHTML = "❌ No results found";
            }
        }
    </script>

</body>
</html>
