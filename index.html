<!DOCTYPE html>
<html>
<head>
    <title>Smart Library</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: black;
            color: white;
            overflow-x: hidden;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
                        url("images/library4.jpg") center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 60px;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            color: transparent;
        }

        .hero p {
            margin-top: 15px;
            opacity: 0.8;
        }

        /* SEARCH */
        .search-box {
            margin-top: 30px;
        }

        input {
            padding: 15px;
            width: 280px;
            border-radius: 30px;
            border: none;
            outline: none;
        }

        button {
            padding: 15px 20px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            cursor: pointer;
            margin-left: 10px;
        }

        button:hover {
            opacity: 0.8;
        }

        /* RESULTS */
        #result {
            padding: 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .card {
            width: 280px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 0 30px rgba(0,255,255,0.6);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card a {
            display: inline-block;
            margin-top: 10px;
            color: #00e6ff;
        }

        /* GALLERY */
        .gallery {
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 20px;
            opacity: 0.5;
        }

    </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>Smart Library</h1>
    <p>Find books instantly. Download PDFs. No more searching shelves.</p>

    <div class="search-box">
        <input type="text" id="searchBox" placeholder="Search books...">
        <button onclick="searchBook()">Search</button>
    </div>
</div>

<!-- RESULTS -->
<div id="result"></div>

<!-- GALLERY -->
<div class="gallery">
    <img src="images/library1.jpg">
    <img src="images/library2.jpg">
    <img src="images/library3.jpg">
    <img src="images/library4.jpg">
</div>

<footer>
    © 2026 Smart Library
</footer>

<script>
const books = [
    {
        name: "Artificial Intelligence",
        author: "Saroj Kaushik",
        location: "Shelf A1",
        pdf: "books/ai.pdf"
    },
    {
        name: "Fundamentals of Database Systems",
        author: "Ramez Elmasri & Shamkant Navathe",
        location: "Shelf B2",
        pdf: "books/dbms.pdf"
    },
    {
        name: "Concrete Technology",
        author: "M L Gambhir",
        location: "Shelf C3",
        pdf: "books/concrete.pdf"
    },
    {
        name: "Power Electronics",
        author: "Ned Mohan",
        location: "Shelf D1",
        pdf: "books/power.pdf"
    },
    {
        name: "Engineering Mechanics",
        author: "Krishna Mohana Rao",
        location: "Shelf E2",
        pdf: "books/mechanics.pdf"
    },
    {
        name: "Programming in ANSI C",
        author: "E. Balagurusamy",
        location: "Shelf F1",
        pdf: "books/cprogramming.pdf"
    }
];

function searchBook() {
    let input = document.getElementById("searchBox").value.toLowerCase();

    let results = books.filter(book =>
        book.name.toLowerCase().includes(input)
    );

    let resultDiv = document.getElementById("result");

    if (results.length > 0) {
        resultDiv.innerHTML = "";

        results.forEach(book => {
            resultDiv.innerHTML += `
                <div class="card">
                    <h3>${book.name}</h3>
                    <p><b>Author:</b> ${book.author}</p>
                    <p><b>Location:</b> ${book.location}</p>
                    <a href="${book.pdf}" target="_blank">📖 View PDF</a>
                </div>
            `;
        });

        window.scrollTo({
            top: document.getElementById("result").offsetTop,
            behavior: "smooth"
        });

    } else {
        resultDiv.innerHTML = "<p style='text-align:center;'>❌ No results found</p>";
    }
}
</script>

</body>
</html>
