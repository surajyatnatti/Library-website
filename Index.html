<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Library Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{background:#0b1020;color:#fff;min-height:100vh}
body:before{content:"";position:fixed;inset:0;background:
radial-gradient(circle at 20% 20%,rgba(0,200,255,.18),transparent 30%),
radial-gradient(circle at 80% 70%,rgba(140,0,255,.18),transparent 30%);
pointer-events:none}
header{padding:20px;text-align:center}
h1{font-size:2.3rem}
.container{width:min(1100px,95%);margin:auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin:20px 0}
.card,.panel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:18px;backdrop-filter:blur(10px)}
.num{font-size:2rem;font-weight:bold}
input,button,select{padding:10px;border-radius:10px;border:none;margin:5px}
input,select{width:100%}
button{background:#0ea5e9;color:white;cursor:pointer}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
.book{padding:10px;border-bottom:1px solid rgba(255,255,255,.1)}
table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid rgba(255,255,255,.1);text-align:left}
</style>
</head>
<body>
<header><h1>📚 Smart Library Pro</h1><p>Digital Borrow Register</p></header>

<div class="container">
<div class="cards">
<div class="card"><div>Total Books</div><div class="num" id="tb">0</div></div>
<div class="card"><div>Borrowed</div><div class="num" id="bb">0</div></div>
<div class="card"><div>Available</div><div class="num" id="ab">0</div></div>
</div>

<div class="grid">
<div class="panel">
<h2>Search Books</h2>
<input id="search" placeholder="Search book name">
<div id="books"></div>
</div>

<div class="panel">
<h2>Issue Book</h2>
<input id="name" placeholder="Student Name">
<input id="usn" placeholder="USN / Roll Number">
<input id="phone" placeholder="Phone Number">
<input id="idproof" placeholder="ID Proof Number">
<select id="bookSelect"></select>
<input id="returndate" type="date">
<button onclick="issueBook()">Issue Book</button>
</div>
</div>

<div class="panel" style="margin-top:20px">
<h2>Borrowed Records</h2>
<table>
<thead><tr><th>Name</th><th>USN</th><th>Book</th><th>Return Date</th><th>Action</th></tr></thead>
<tbody id="records"></tbody>
</table>
</div>
</div>

<script>
const books=[
"Programming in ANSI C",
"Artificial Intelligence",
"Fundamentals of Database Systems",
"Concrete Technology",
"Power Electronics",
"Engineering Mechanics",
"Introduction to Embedded Systems"
];

let records=JSON.parse(localStorage.getItem("libraryRecords")||"[]");

function updateStats(){
tb.textContent=books.length;
bb.textContent=records.length;
ab.textContent=books.length-records.length;
}

function renderBooks(){
const q=search.value.toLowerCase();
books.innerHTML="";
window.booksList.filter(b=>b.toLowerCase().includes(q)).forEach(b=>{
books.innerHTML+=`<div class='book'>📖 ${b}</div>`;
});
}

function loadSelect(){
bookSelect.innerHTML="";
booksList.forEach(b=>bookSelect.innerHTML+=`<option>${b}</option>`);
}

function issueBook(){
const r={
name:name.value,
usn:usn.value,
phone:phone.value,
id:idproof.value,
book:bookSelect.value,
ret:returndate.value
};
if(!r.name||!r.usn){alert("Fill required fields");return;}
records.push(r);
localStorage.setItem("libraryRecords",JSON.stringify(records));
renderRecords();updateStats();
alert("Book Issued Successfully");
}

function renderRecords(){
recordsEl=document.getElementById("records");
recordsEl.innerHTML="";
records.forEach((r,i)=>{
recordsEl.innerHTML+=`<tr>
<td>${r.name}</td>
<td>${r.usn}</td>
<td>${r.book}</td>
<td>${r.ret}</td>
<td><button onclick="returnBook(${i})">Return</button></td>
</tr>`;
});
}

function returnBook(i){
records.splice(i,1);
localStorage.setItem("libraryRecords",JSON.stringify(records));
renderRecords();updateStats();
}

window.booksList=books;
search.addEventListener("input",renderBooks);
loadSelect();
renderBooks();
renderRecords();
updateStats();
</script>
</body>
</html>
