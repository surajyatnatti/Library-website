<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Library Pro Ultimate</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{background:#0a0f1f;color:#fff}
body:before{content:'';position:fixed;inset:0;background:
radial-gradient(circle at 20% 20%,rgba(0,255,255,.15),transparent 30%),
radial-gradient(circle at 80% 80%,rgba(140,0,255,.15),transparent 30%);pointer-events:none}
.container{width:min(1200px,95%);margin:auto;padding:20px}
h1{text-align:center;margin:20px 0}
.panel,.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
input,select,button{width:100%;padding:10px;margin:6px 0;border:none;border-radius:10px}
button{background:#0ea5e9;color:white;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid rgba(255,255,255,.1)}
.book{padding:8px}
.hidden{display:none}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h1>📚 Smart Library Pro Ultimate</h1>

<div class="cards">
<div class="card">Total Books<br><h2 id="totalBooks">0</h2></div>
<div class="card">Pending Requests<br><h2 id="pending">0</h2></div>
<div class="card">Issued Books<br><h2 id="issued">0</h2></div>
<div class="card">Available Books<br><h2 id="available">0</h2></div>
</div>

<div class="grid">
<div class="panel">
<h2>🔍 Search Books</h2>
<input id="search" placeholder="Search books">
<button onclick="renderBooks()">Search</button>
<div id="bookList"></div>
</div>

<div class="panel">
<h2>👨‍🎓 Request Book</h2>
<input id="studentName" placeholder="Student Name">
<input id="studentUSN" placeholder="USN">
<select id="bookSelect"></select>
<button onclick="requestBook()">Request Book</button>
</div>
</div>

<div class="panel" style="margin-top:20px">
<h2>🔐 Librarian Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="status"></p>
</div>

<div id="adminPanel" class="hidden">
<div class="grid">
<div class="panel">
<h2>➕ Add Book</h2>
<input id="newBook" placeholder="Book Name">
<button onclick="addBook()">Add Book</button>
</div>

<div class="panel">
<h2>📋 Requests</h2>
<table>
<thead><tr><th>Name</th><th>Book</th><th>Status</th><th>Action</th></tr></thead>
<tbody id="requestsTable"></tbody>
</table>
</div>
</div>

<div class="panel" style="margin-top:20px">
<h2>📖 Issued Books</h2>
<table>
<thead><tr><th>Name</th><th>USN</th><th>Book</th><th>Action</th></tr></thead>
<tbody id="issuedTable"></tbody>
</table>
</div>
</div>
</div>

<script>
let books=JSON.parse(localStorage.getItem('books')||JSON.stringify([
'Programming in ANSI C',
'Artificial Intelligence',
'Fundamentals of Database Systems',
'Concrete Technology',
'Power Electronics',
'Engineering Mechanics',
'Introduction to Embedded Systems'
]));

let requests=JSON.parse(localStorage.getItem('requests')||'[]');
let issued=JSON.parse(localStorage.getItem('issued')||'[]');

function save(){
localStorage.setItem('books',JSON.stringify(books));
localStorage.setItem('requests',JSON.stringify(requests));
localStorage.setItem('issued',JSON.stringify(issued));
updateStats();
}

function updateStats(){
totalBooks.innerText=books.length;
pending.innerText=requests.filter(r=>r.status==='Pending').length;
issuedCount=issued.length;
document.getElementById('issued').innerText=issuedCount;
available.innerText=books.length-issuedCount;
}

function renderBooks(){
const q=search.value.toLowerCase();
bookList.innerHTML='';
books.filter(b=>b.toLowerCase().includes(q)).forEach(b=>{
bookList.innerHTML+=`<div class='book'>📚 ${b}</div>`;
});
}

function loadSelect(){
bookSelect.innerHTML='';
books.forEach(b=>bookSelect.innerHTML+=`<option>${b}</option>`);
}

function requestBook(){
requests.push({
name:studentName.value,
usn:studentUSN.value,
book:bookSelect.value,
status:'Pending'
});
save();
renderRequests();
alert('Request Sent');
}

function login(){
if(user.value==='librarian' && pass.value==='admin123'){
adminPanel.classList.remove('hidden');
status.innerText='✅ Logged In';
}else{
status.innerText='❌ Wrong Credentials';
}
}

function renderRequests(){
requestsTable.innerHTML='';
requests.forEach((r,i)=>{
requestsTable.innerHTML+=`
<tr>
<td>${r.name}</td>
<td>${r.book}</td>
<td>${r.status}</td>
<td>
${r.status==='Pending'
?`<button onclick="approve(${i})">Approve</button>`
:'Approved'}
</td>
</tr>`;
});
}

function approve(i){
requests[i].status='Approved';
issued.push(requests[i]);
save();
renderRequests();
renderIssued();
}

function renderIssued(){
issuedTable.innerHTML='';
issued.forEach((r,i)=>{
issuedTable.innerHTML+=`
<tr>
<td>${r.name}</td>
<td>${r.usn}</td>
<td>${r.book}</td>
<td><button onclick="returnBook(${i})">Return</button></td>
</tr>`;
});
}

function returnBook(i){
issued.splice(i,1);
save();
renderIssued();
}

function addBook(){
if(newBook.value.trim()){
books.push(newBook.value.trim());
newBook.value='';
save();
loadSelect();
renderBooks();
}
}

loadSelect();
renderBooks();
renderRequests();
renderIssued();
updateStats();
</script>
</body>
</html>
